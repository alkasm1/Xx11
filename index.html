<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v5</title>

<style>
body {
  font-family: Arial;
  background: #fff;
  margin: 0;
  padding: 20px;
}
textarea, input, button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
}
canvas {
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>ALM GeoFreq v5</h2>

<input id="userKey" value="123456789">
<textarea id="inputText" rows="6"></textarea>

<button onclick="encode()">تحويل إلى صورة</button>
<button onclick="decode()">استعادة النص</button>

<input type="file" id="imageInput">

<canvas id="canvas"></canvas>

<div id="output"></div>

<script>
// =========================
// إعدادات
// =========================
const B = 32;
const LMAX = 12;
const SIZE = 1024;
const HEADER = 16; // 8 بايت لطول البيانات

// =========================
// جدول الحروف
// =========================
const indexToChar = {
  1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
  8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",
  14:"ص",15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",
  20:"ف",21:"ق",22:"ك",23:"ل",24:"م",25:"ن",
  26:"ه",27:"و",28:"ي"
};

const charToIndex = {};
for (let k in indexToChar) charToIndex[indexToChar[k]] = Number(k);

// =========================
// تنظيف النص
// =========================
function normalizeArabic(s) {
  return s.replace(/[إأآ]/g,"ا")
          .replace(/ى/g,"ي")
          .replace(/ؤ/g,"و")
          .replace(/ئ/g,"ي")
          .replace(/ة/g,"ه");
}

function cleanText(text) {
  return text.split("")
    .filter(ch => charToIndex[ch] || ch === " ")
    .join("")
    .replace(/\s+/g," ")
    .trim();
}

// =========================
// تحويل كلمة → رقم
// =========================
function wordToCode(word){
  const c = new Array(LMAX).fill(0);
  let pos = 0;

  for (let i = word.length-1; i >= 0; i--) {
    const idx = charToIndex[word[i]];
    if (idx === undefined) continue;
    c[pos++] = idx;
    if (pos >= LMAX) break;
  }

  let C = 0n;
  for (let i=0;i<LMAX;i++){
    C += BigInt(c[i]) * (BigInt(B)**BigInt(i));
  }
  return C;
}

// =========================
// رقم → كلمة
// =========================
function codeToWord(C){
  let out = "";
  for (let i=0;i<LMAX;i++){
    const d = Number(C % BigInt(B));
    C /= BigInt(B);
    if (d) out = indexToChar[d] + out;
  }
  return out;
}

// =========================
// تقسيم
// =========================
function splitWord(w){
  const arr=[];
  for(let i=0;i<w.length;i+=LMAX){
    arr.push(w.slice(i,i+LMAX));
  }
  return arr;
}

// =========================
// ENCODE
// =========================
function encode(){
  let text = normalizeArabic(document.getElementById("inputText").value);
  text = cleanText(text);

  const key = BigInt(document.getElementById("userKey").value || 0);

  const words = text.split(" ");
  const blocks=[];

  words.forEach(w=>{
    splitWord(w).forEach(b=>blocks.push(b));
  });

  const canvas = document.getElementById("canvas");
  canvas.width = SIZE;
  canvas.height = SIZE;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle="white";
  ctx.fillRect(0,0,SIZE,SIZE);

  // تخزين عدد البلوكات
  let count = BigInt(blocks.length);
  for(let i=0;i<8;i++){
    const val = Number((count >> BigInt(8*i)) & 0xFFn);
    drawPixel(ctx,i,255-val);
  }

  // كتابة البيانات
  blocks.forEach((b,bi)=>{
    let C = wordToCode(b) ^ key;

    for(let j=0;j<8;j++){
      const byte = Number((C >> BigInt(8*j)) & 0xFFn);
      const p = HEADER + bi*8 + j;
      drawPixel(ctx,p,255-byte);
    }
  });

  alert("تم التشفير");
}

// =========================
// DECODE
// =========================
function decode(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return;

  const key = BigInt(document.getElementById("userKey").value || 0);

  const img = new Image();
  img.onload = ()=>{
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img,0,0);

    const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

    // قراءة عدد البلوكات
    let count=0n;
    for(let i=0;i<8;i++){
      const val = 255 - data[i*4];
      count |= (BigInt(val) << BigInt(8*i));
    }

    const blocks=[];

    for(let bi=0; bi<Number(count); bi++){
      let C=0n;

      for(let j=0;j<8;j++){
        const p = HEADER + bi*8 + j;
        const val = 255 - data[p*4];
        C |= (BigInt(val) << BigInt(8*j));
      }

      const word = codeToWord(C ^ key);
      if(word) blocks.push(word);
    }

    document.getElementById("output").innerText = blocks.join(" ");
  };

  img.src = URL.createObjectURL(file);
}

// =========================
// رسم بكسل
// =========================
function drawPixel(ctx,p,gray){
  const x = p % SIZE;
  const y = Math.floor(p / SIZE);

  const img = ctx.createImageData(1,1);
  img.data[0]=gray;
  img.data[1]=gray;
  img.data[2]=gray;
  img.data[3]=255;

  ctx.putImageData(img,x,y);
}
</script>

</body>
</html>
