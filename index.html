<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v2.1 – Text to Points</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 800px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover {
  background: #0a8c6c;
}
textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 120px;
  white-space: pre-wrap;
}
#canvasWrapper {
  margin-top: 20px;
  text-align: center;
}
</style>
</head>

<body>

<header>ALM GeoFreq v2.1 – Text ↔ Points</header>

<div class="container">

  <h3>1) مفتاح المستخدم (32‑بت – ثماني خانات هكس)</h3>
  <input id="userKey" type="text" value="A1B2C3D4" placeholder="مثال: A1B2C3D4">

  <h3>2) إدخال نص</h3>
  <textarea id="inputText" rows="8" placeholder="اكتب نصًا هنا..."></textarea>

  <button onclick="encodeGeoFreq()">تحويل النص إلى صورة نقاط</button>

  <div id="canvasWrapper">
    <canvas id="geoCanvas"></canvas>
    <button onclick="saveImage()">💾 حفظ الصورة</button>
  </div>

  <hr>

  <h3>3) استعادة النص من صورة</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decodeGeoFreq()">استعادة النص</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ===================== Hash Function ===================== */
function hashWord(word) {
  let h = 0;
  for (let i = 0; i < word.length; i++) {
    h = (h * 31 + word.charCodeAt(i)) >>> 0;
  }
  return BigInt(h >>> 0);
}

/* ===================== Key Parsing ===================== */
function parseKey32(hexStr) {
  hexStr = hexStr.replace(/[^0-9A-Fa-f]/g, "");
  if (hexStr.length !== 8) return BigInt(0xA1B2C3D4);
  return BigInt(parseInt(hexStr, 16) >>> 0);
}

/* ===================== Auto Size ===================== */
function chooseSize(nWords) {
  if (nWords <= 50000) return 512;
  if (nWords <= 200000) return 1024;
  if (nWords <= 1000000) return 2048;
  return 4096;
}

/* ===================== Encode ===================== */
function encodeGeoFreq() {
  const key = parseKey32(document.getElementById("userKey").value);
  let text = document.getElementById("inputText").value.trim();
  if (!text) {
    alert("الرجاء إدخال نص.");
    return;
  }

  let words = text.split(/\s+/);
  let n = words.length;

  let size = chooseSize(n);
  let canvas = document.getElementById("geoCanvas");
  canvas.width = size;
  canvas.height = size;

  let ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, size, size);

  ctx.fillStyle = "black";

  for (let i = 0; i < n; i++) {
    let freq = hashWord(words[i]); // 32-bit
    let order = BigInt(i);         // 32-bit

    // Combine into 64-bit
    let combined = (order << 32n) | freq;

    // Encrypt
    let secure = combined ^ key;

    // Convert to integer
    let secureNum = Number(secure % BigInt(size * size));

    let X = secureNum % size;
    let Y = Math.floor(secureNum / size);

    ctx.fillRect(X, Y, 1, 1);
  }

  alert("✔ تم تحويل النص إلى صورة نقاط بنجاح!");
}

/* ===================== Save Image ===================== */
function saveImage() {
  const canvas = document.getElementById("geoCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-geofreq.png";
  a.click();
}

/* ===================== Decode ===================== */
function decodeGeoFreq() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("الرجاء اختيار صورة.");
    return;
  }

  const key = parseKey32(document.getElementById("userKey").value);

  const img = new Image();
  img.onload = () => {
    let canvas = document.getElementById("geoCanvas");
    let ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    let data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    let points = [];

    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        let i = (y * canvas.width + x) * 4;

        if (data[i] < 128) { // black pixel
          let secure = BigInt(y * canvas.width + x);

          let combined = secure ^ key;

          let order = combined >> 32n;
          let freq = combined & 0xFFFFFFFFn;

          points.push({ order: Number(order), freq });
        }
      }
    }

    points.sort((a, b) => a.order - b.order);

    let result = points.map(p => "كلمة" + p.freq).join(" ");

    document.getElementById("outputText").textContent = result;
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
