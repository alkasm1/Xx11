<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v6.0 — Full Character Encoding</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover { background: #0a8c6c; }
textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 120px;
  white-space: pre-wrap;
}
#canvasWrapper { margin-top: 20px; text-align: center; }
</style>
</head>

<body>

<header>ALM GeoFreq v6.0 — Full Character Encoding</header>

<div class="container">

  <h3>مفتاح المستخدم:</h3>
  <input id="userKey" type="text" value="123456789">

  <h3>النص العربي:</h3>
  <textarea id="inputText" rows="8" placeholder="اكتب نصًا عربيًا هنا..."></textarea>

  <button onclick="encodeGeoFreq()">تحويل النص إلى صورة نقاط</button>

  <div id="canvasWrapper">
    <canvas id="geoCanvas"></canvas>
    <button onclick="saveImage()">💾 حفظ الصورة</button>
  </div>

  <hr>

  <h3>استعادة النص من صورة:</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decodeGeoFreq()">استعادة النص</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ===================== 1) تطبيع العربية ===================== */
function normalizeArabic(s) {
  return (s || "")
    .replace(/[إأآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه");
}

/* ===================== 2) جدول الحروف (أساس 64) ===================== */
const alphabet = " ابتثجحخدذرزسشصضطظعغفقكلمنهوي0123456789.,!?-";
const B = alphabet.length;
const LMAX = 12;

function charIndex(ch) {
  const i = alphabet.indexOf(ch);
  return i >= 0 ? i : 0;
}

function indexChar(i) {
  return alphabet[i] || "";
}

/* ===================== 3) تقسيم النص إلى بلوكات ثابتة ===================== */
function splitText(text) {
  const blocks = [];
  for (let i = 0; i < text.length; i += LMAX) {
    blocks.push(text.slice(i, i + LMAX));
  }
  return blocks;
}

/* ===================== 4) block → C ===================== */
function blockToCode(block) {
  let C = 0n;
  for (let i = 0; i < LMAX; i++) {
    const ch = block[i] || " ";
    const idx = charIndex(ch);
    C += BigInt(idx) * (BigInt(B) ** BigInt(i));
  }
  return C;
}

/* ===================== 5) C → block ===================== */
function codeToBlock(Cbig) {
  let C = BigInt(Cbig);
  let out = "";
  for (let i = 0; i < LMAX; i++) {
    const idx = Number(C % BigInt(B));
    C /= BigInt(B);
    out += indexChar(idx);
  }
  return out;
}

/* ===================== 6) ترميز النص ===================== */
function encodeGeoFreq() {
  const key = BigInt(document.getElementById("userKey").value || "0");
  let text = normalizeArabic(document.getElementById("inputText").value);

  const blocks = splitText(text);

  const size = 1024;
  const HEADER_PIXELS = 8;
  const maxPixels = size * size;
  const neededPixels = HEADER_PIXELS + blocks.length * 8;

  if (neededPixels > maxPixels) {
    alert("النص طويل جدًا لصورة واحدة.");
    return;
  }

  const canvas = document.getElementById("geoCanvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, size, size);

  // تخزين عدد البلوكات
  const blockCount = BigInt(blocks.length);
  for (let i = 0; i < 8; i++) {
    const byteVal = Number((blockCount >> BigInt(8 * i)) & 0xFFn);
    const gray = 255 - byteVal;
    const imgData = ctx.createImageData(1,1);
    imgData.data[0] = gray;
    imgData.data[1] = gray;
    imgData.data[2] = gray;
    imgData.data[3] = 255;
    ctx.putImageData(imgData, i, 0);
  }

  // تخزين البلوكات
  blocks.forEach((block, bi) => {
    const C = blockToCode(block);
    const C2 = C ^ key;

    for (let byteIndex = 0; byteIndex < 8; byteIndex++) {
      const byteVal = Number((C2 >> BigInt(8 * byteIndex)) & 0xFFn);
      const p = HEADER_PIXELS + bi * 8 + byteIndex;
      const x = p % size;
      const y = Math.floor(p / size);
      const gray = 255 - byteVal;

      const imgData = ctx.createImageData(1,1);
      imgData.data[0] = gray;
      imgData.data[1] = gray;
      imgData.data[2] = gray;
      imgData.data[3] = 255;
      ctx.putImageData(imgData, x, y);
    }
  });

  alert("✔ تم تحويل النص إلى صورة بنجاح!");
}

/* ===================== 7) حفظ الصورة ===================== */
function saveImage() {
  const canvas = document.getElementById("geoCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-geofreq-v6.png";
  a.click();
}

/* ===================== 8) فك التشفير ===================== */
function decodeGeoFreq() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة.");

  const key = BigInt(document.getElementById("userKey").value || "0");

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("geoCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const size = canvas.width;
    const data = ctx.getImageData(0, 0, size, size).data;

    // قراءة عدد البلوكات
    let blockCount = 0n;
    for (let i = 0; i < 8; i++) {
      const r = data[(i * 4)];
      const byteVal = 255 - r;
      blockCount |= (BigInt(byteVal) << BigInt(8 * i));
    }

    const totalBlocks = Number(blockCount);
    const HEADER_PIXELS = 8;

    let text = "";

    for (let bi = 0; bi < totalBlocks; bi++) {
      let C2 = 0n;
      for (let byteIndex = 0; byteIndex < 8; byteIndex++) {
        const p = HEADER_PIXELS + bi * 8 + byteIndex;
        const x = p % size;
        const y = Math.floor(p / size);
        const i = (y * size + x) * 4;
        const r = data[i];
        const byteVal = 255 - r;
        C2 |= (BigInt(byteVal) << BigInt(8 * byteIndex));
      }

      const C = C2 ^ key;
      text += codeToBlock(C);
    }

    document.getElementById("outputText").textContent = text.trim();
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
