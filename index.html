<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v8.0 — Multi‑Panel Single Image</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover { background: #0a8c6c; }
textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 120px;
  white-space: pre-wrap;
}
#canvasWrapper { margin-top: 20px; text-align: center; }
</style>
</head>

<body>

<header>ALM GeoFreq v8.0 — Multi‑Panel Single Image</header>

<div class="container">

  <h3>مفتاح المستخدم:</h3>
  <input id="userKey" type="text" value="123456789">

  <h3>النص العربي:</h3>
  <textarea id="inputText" rows="8" placeholder="اكتب نصًا عربيًا هنا..."></textarea>

  <button onclick="encode()">تحويل النص إلى صورة واحدة متعددة الأجزاء</button>

  <div id="canvasWrapper">
    <canvas id="geoCanvas"></canvas>
    <button onclick="saveImage()">💾 حفظ الصورة</button>
  </div>

  <hr>

  <h3>استعادة النص من صورة:</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decode()">استعادة النص</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ============================================================
   1) جدول الترميز
============================================================ */
const alphabet = " ابتثجحخدذرزسشصضطظعغفقكلمنهوي0123456789.,!?-";
const B = alphabet.length;
const LMAX = 12;

/* ============================================================
   2) تنظيف النص
============================================================ */
function clean(text) {
  text = text
    .replace(/[إأآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه");

  text = text.replace(/[٠-٩]/g, d => "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);

  text = text
    .replace(/،/g, ",")
    .replace(/؛/g, ";")
    .replace(/ـ/g, "-")
    .replace(/[“”«»]/g, '"')
    .replace(/[…]/g, ".");

  text = text.replace(/[\u064B-\u065F]/g, "");
  text = text.replace(/[\u200C\u200D\u202A\u202B\u202C\u202D\u202E]/g, "");
  text = text.replace(/\s+/g, " ");

  let out = "";
  for (let ch of text) {
    if (alphabet.includes(ch)) out += ch;
  }
  return out.trim();
}

/* ============================================================
   3) تحويل بلوك إلى كود
============================================================ */
function blockToCode(block) {
  let C = 0n;
  for (let i = 0; i < LMAX; i++) {
    const ch = block[i] || " ";
    const idx = alphabet.indexOf(ch);
    C += BigInt(idx) * (BigInt(B) ** BigInt(i));
  }
  return C;
}

/* ============================================================
   4) كود إلى بلوك
============================================================ */
function codeToBlock(Cbig) {
  let C = BigInt(Cbig);
  let out = "";
  for (let i = 0; i < LMAX; i++) {
    const idx = Number(C % BigInt(B));
    C /= BigInt(B);
    out += alphabet[idx] || "";
  }
  return out;
}

/* ============================================================
   5) كتابة بت كنقطة سوداء/بيضاء
============================================================ */
function setBit(ctx, size, p, bit) {
  const x = p % size;
  const y = Math.floor(p / size);
  const img = ctx.createImageData(1,1);
  const v = bit ? 0 : 255;
  img.data[0] = v;
  img.data[1] = v;
  img.data[2] = v;
  img.data[3] = 255;
  ctx.putImageData(img, x, y);
}

/* ============================================================
   6) قراءة بت من نقطة
============================================================ */
function getBit(data, size, p) {
  const x = p % size;
  const y = Math.floor(p / size);
  const i = (y * size + x) * 4;
  return data[i] < 128 ? 1 : 0;
}

/* ============================================================
   7) ترميز النص إلى Panels داخل صورة واحدة
============================================================ */
function encode() {
  const key = BigInt(document.getElementById("userKey").value || "0");

  let text = clean(document.getElementById("inputText").value);
  if (!text) return alert("النص فارغ بعد التنظيف.");

  const words = text.split(" ");
  const PANEL_WORDS = 300;

  const panels = [];
  for (let i = 0; i < words.length; i += PANEL_WORDS) {
    panels.push(words.slice(i, i + PANEL_WORDS).join(" "));
  }

  const size = 1024;
  const canvas = document.getElementById("geoCanvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, size, size);

  const PANEL_HEIGHT = Math.floor(size / panels.length);
  const HEADER_BITS = 64;
  const BITS_PER_BLOCK = 64;

  let globalOffset = 0;

  panels.forEach((panelText, pi) => {
    const blocks = [];
    for (let i = 0; i < panelText.length; i += LMAX) {
      blocks.push(panelText.slice(i, i + LMAX));
    }

    const panelStart = pi * PANEL_HEIGHT * size;

    // 1) هيدر: عدد البلوكات
    let blockCount = BigInt(blocks.length);
    for (let bit = 0; bit < 64; bit++) {
      const b = Number((blockCount >> BigInt(bit)) & 1n);
      setBit(ctx, size, panelStart + bit, b);
    }

    // 2) البلوكات
    blocks.forEach((block, bi) => {
      const C = blockToCode(block);
      const C2 = C ^ key;

      for (let bit = 0; bit < 64; bit++) {
        const b = Number((C2 >> BigInt(bit)) & 1n);
        const p = panelStart + HEADER_BITS + bi * BITS_PER_BLOCK + bit;
        setBit(ctx, size, p, b);
      }
    });
  });

  alert("✔ تم إنشاء صورة واحدة تحتوي عدة Panels بنجاح!");
}

/* ============================================================
   8) حفظ الصورة
============================================================ */
function saveImage() {
  const canvas = document.getElementById("geoCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-geofreq-v8.png";
  a.click();
}

/* ============================================================
   9) فك التشفير
============================================================ */
function decode() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة.");

  const key = BigInt(document.getElementById("userKey").value || "0");

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("geoCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const size = canvas.width;
    const data = ctx.getImageData(0, 0, size, size).data;

    const PANEL_HEIGHT = Math.floor(size / 10); // نفترض 10 Panels كحد أقصى
    const HEADER_BITS = 64;
    const BITS_PER_BLOCK = 64;

    let finalText = "";

    for (let pi = 0; pi < 10; pi++) {
      const panelStart = pi * PANEL_HEIGHT * size;

      // قراءة عدد البلوكات
      let blockCount = 0n;
      for (let bit = 0; bit < 64; bit++) {
        const b = getBit(data, size, panelStart + bit);
        if (b) blockCount |= (1n << BigInt(bit));
      }

      const totalBlocks = Number(blockCount);
      if (totalBlocks <= 0) continue;

      for (let bi = 0; bi < totalBlocks; bi++) {
        let C2 = 0n;
        for (let bit = 0; bit < 64; bit++) {
          const p = panelStart + HEADER_BITS + bi * BITS_PER_BLOCK + bit;
          const b = getBit(data, size, p);
          if (b) C2 |= (1n << BigInt(bit));
        }
        const C = C2 ^ key;
        finalText += codeToBlock(C);
      }
    }

    document.getElementById("outputText").textContent = finalText.trim();
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
