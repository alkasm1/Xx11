<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v7.0 — Black Dots Positional Encoding</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover { background: #0a8c6c; }
textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 120px;
  white-space: pre-wrap;
}
#canvasWrapper { margin-top: 20px; text-align: center; }
</style>
</head>

<body>

<header>ALM GeoFreq v7.0 — Black Dots Positional Encoding</header>

<div class="container">

  <h3>مفتاح المستخدم:</h3>
  <input id="userKey" type="text" value="123456789">

  <h3>النص العربي:</h3>
  <textarea id="inputText" rows="8" placeholder="اكتب نصًا عربيًا هنا..."></textarea>

  <button onclick="encodeGeoFreq()">تحويل النص إلى صورة نقاط</button>

  <div id="canvasWrapper">
    <canvas id="geoCanvas"></canvas>
    <button onclick="saveImage()">💾 حفظ الصورة</button>
  </div>

  <hr>

  <h3>استعادة النص من صورة:</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decodeGeoFreq()">استعادة النص</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ========== 1) جدول الترميز ========== */
const alphabet = " ابتثجحخدذرزسشصضطظعغفقكلمنهوي0123456789.,!?-";
const B = alphabet.length;
const LMAX = 12;

/* ========== 2) تنظيف شامل قبل الترميز ========== */
function cleanAndFilter(text) {
  text = text
    .replace(/[إأآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه");

  text = text.replace(/[٠-٩]/g, d => "0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)]);

  text = text
    .replace(/،/g, ",")
    .replace(/؛/g, ";")
    .replace(/ـ/g, "-")
    .replace(/[“”«»]/g, '"')
    .replace(/[…]/g, ".");

  text = text.replace(/[\u064B-\u065F]/g, "");
  text = text.replace(/[\u200C\u200D\u202A\u202B\u202C\u202D\u202E]/g, "");
  text = text.replace(/\s+/g, " ");

  let out = "";
  for (let ch of text) {
    if (alphabet.includes(ch)) out += ch;
  }
  return out.trim();
}

/* ========== 3) فهرسة الحروف ========== */
function charIndex(ch) {
  const i = alphabet.indexOf(ch);
  return i >= 0 ? i : 0;
}
function indexChar(i) {
  return alphabet[i] || "";
}

/* ========== 4) تقسيم النص إلى بلوكات ========== */
function splitText(text) {
  const blocks = [];
  for (let i = 0; i < text.length; i += LMAX) {
    blocks.push(text.slice(i, i + LMAX));
  }
  return blocks;
}

/* ========== 5) block → C (BigInt) ========== */
function blockToCode(block) {
  let C = 0n;
  for (let i = 0; i < LMAX; i++) {
    const ch = block[i] || " ";
    const idx = charIndex(ch);
    C += BigInt(idx) * (BigInt(B) ** BigInt(i));
  }
  return C;
}

/* ========== 6) C → block ========== */
function codeToBlock(Cbig) {
  let C = BigInt(Cbig);
  let out = "";
  for (let i = 0; i < LMAX; i++) {
    const idx = Number(C % BigInt(B));
    C /= BigInt(B);
    out += indexChar(idx);
  }
  return out;
}

/* ========== 7) كتابة بت في بكسل (أسود/أبيض) ========== */
function setBitPixel(ctx, size, p, bit) {
  const x = p % size;
  const y = Math.floor(p / size);
  const imgData = ctx.createImageData(1,1);
  const v = bit ? 0 : 255; // 1 = أسود, 0 = أبيض
  imgData.data[0] = v;
  imgData.data[1] = v;
  imgData.data[2] = v;
  imgData.data[3] = 255;
  ctx.putImageData(imgData, x, y);
}

/* ========== 8) قراءة بت من بكسل ========== */
function getBitPixel(data, size, p) {
  const x = p % size;
  const y = Math.floor(p / size);
  const i = (y * size + x) * 4;
  const r = data[i];
  return (r < 128) ? 1 : 0; // أسود = 1, أبيض = 0
}

/* ========== 9) ترميز النص إلى صورة (نقاط سوداء فقط) ========== */
function encodeGeoFreq() {
  const key = BigInt(document.getElementById("userKey").value || "0");

  let text = document.getElementById("inputText").value;
  text = cleanAndFilter(text);
  if (!text) {
    alert("لا يوجد نص صالح بعد التنظيف.");
    return;
  }

  const blocks = splitText(text);

  const size = 1024;
  const canvas = document.getElementById("geoCanvas");
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, size, size);

  // سنستخدم أول 64 بكسل لتخزين عدد البلوكات (blockCount) كـ 64 بت
  const HEADER_BITS = 64;
  const BITS_PER_BLOCK = 64;
  const maxPixels = size * size;
  const neededBits = HEADER_BITS + blocks.length * BITS_PER_BLOCK;

  if (neededBits > maxPixels) {
    alert("النص طويل جدًا لصورة واحدة 1024×1024 بنظام 64 بت لكل بلوك.");
    return;
  }

  // 1) تخزين عدد البلوكات في أول 64 بت
  let blockCount = BigInt(blocks.length);
  for (let bitIndex = 0; bitIndex < 64; bitIndex++) {
    const bit = Number((blockCount >> BigInt(bitIndex)) & 1n);
    setBitPixel(ctx, size, bitIndex, bit);
  }

  // 2) تخزين البلوكات: كل بلوك = 64 بت = 64 بكسل
  blocks.forEach((block, bi) => {
    const C = blockToCode(block);
    const C2 = C ^ key;

    for (let bitIndex = 0; bitIndex < 64; bitIndex++) {
      const bit = Number((C2 >> BigInt(bitIndex)) & 1n);
      const p = HEADER_BITS + bi * BITS_PER_BLOCK + bitIndex;
      setBitPixel(ctx, size, p, bit);
    }
  });

  alert("✔ تم تحويل النص إلى صورة نقاط سوداء بنجاح!");
}

/* ========== 10) حفظ الصورة ========== */
function saveImage() {
  const canvas = document.getElementById("geoCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-geofreq-v7.png";
  a.click();
}

/* ========== 11) فك التشفير من الصورة ========== */
function decodeGeoFreq() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة.");

  const key = BigInt(document.getElementById("userKey").value || "0");

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("geoCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const size = canvas.width;
    const data = ctx.getImageData(0, 0, size, size).data;

    const HEADER_BITS = 64;
    const BITS_PER_BLOCK = 64;

    // 1) قراءة عدد البلوكات من أول 64 بت
    let blockCount = 0n;
    for (let bitIndex = 0; bitIndex < 64; bitIndex++) {
      const bit = getBitPixel(data, size, bitIndex);
      if (bit) {
        blockCount |= (1n << BigInt(bitIndex));
      }
    }

    const totalBlocks = Number(blockCount);
    let text = "";

    // 2) قراءة كل بلوك
    for (let bi = 0; bi < totalBlocks; bi++) {
      let C2 = 0n;
      for (let bitIndex = 0; bitIndex < 64; bitIndex++) {
        const p = HEADER_BITS + bi * BITS_PER_BLOCK + bitIndex;
        const bit = getBitPixel(data, size, p);
        if (bit) {
          C2 |= (1n << BigInt(bitIndex));
        }
      }
      const C = C2 ^ key;
      text += codeToBlock(C);
    }

    document.getElementById("outputText").textContent = text.trim();
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
