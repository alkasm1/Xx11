<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v3.0 — Reversible Frequency Engine</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover { background: #0a8c6c; }
textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 120px;
  white-space: pre-wrap;
}
#canvasWrapper { margin-top: 20px; text-align: center; }
</style>
</head>

<body>

<header>ALM GeoFreq v3.0 — Reversible Frequency Engine</header>

<div class="container">

  <h3>مفتاح المستخدم (عدد صحيح كبير):</h3>
  <input id="userKey" type="text" value="123456789">

  <h3>النص العربي:</h3>
  <textarea id="inputText" rows="8" placeholder="اكتب نصًا عربيًا هنا..."></textarea>

  <button onclick="encodeGeoFreq()">تحويل النص إلى صورة نقاط</button>

  <div id="canvasWrapper">
    <canvas id="geoCanvas"></canvas>
    <button onclick="saveImage()">💾 حفظ الصورة</button>
  </div>

  <hr>

  <h3>استعادة النص من صورة:</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decodeGeoFreq()">استعادة النص</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ============================================================
   1) Arabic Normalization
============================================================ */
function normalizeArabic(s) {
  return (s || "")
    .replace(/[إأآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه");
}

/* ============================================================
   2) Alphabet Table (Base‑32)
============================================================ */
const B = 32;
const LMAX = 12;

const indexToChar = {
  0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
  8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
  15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
  22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
};

const charToIndex = {};
for (const [i,ch] of Object.entries(indexToChar)) {
  if (ch) charToIndex[ch] = parseInt(i, 10);
}

/* ============================================================
   3) Split Word into Blocks
============================================================ */
function splitWord(word) {
  const blocks = [];
  for (let i = 0; i < word.length; i += LMAX) {
    blocks.push(word.slice(i, i + LMAX));
  }
  return blocks;
}

/* ============================================================
   4) word → C (BigInt)
============================================================ */
function wordToCode(word){
  const c = new Array(LMAX).fill(0);
  let pos = 0;
  for (let i = word.length - 1; i >= 0; i--){
    const idx = charToIndex[word[i]];
    if (idx === undefined) throw new Error("حرف غير مدعوم: " + word[i]);
    c[pos++] = idx;
  }
  let C = 0n;
  for (let i = 0; i < LMAX; i++){
    C += BigInt(c[i]) * (BigInt(B) ** BigInt(i));
  }
  return C;
}

/* ============================================================
   5) C → word
============================================================ */
function codeToWord(Cbig){
  let C = BigInt(Cbig);
  const digits = [];
  for (let i = 0; i < LMAX; i++){
    digits.push(Number(C % BigInt(B)));
    C /= BigInt(B);
  }
  let w = "";
  for (let i = LMAX - 1; i >= 0; i--){
    w += indexToChar[digits[i]] || "";
  }
  return w;
}

/* ============================================================
   6) Encode Text → 1024×1024 Points
============================================================ */
function encodeGeoFreq() {
  const key = BigInt(document.getElementById("userKey").value || "0");
  let text = normalizeArabic(document.getElementById("inputText").value.trim());
  if (!text) return alert("الرجاء إدخال نص.");

  const words = text.split(/\s+/);
  const blocks = [];

  for (const w of words) {
    for (const b of splitWord(w)) {
      blocks.push(b);
    }
  }

  const size = 1024;
  const canvas = document.getElementById("geoCanvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, size, size);
  ctx.fillStyle = "black";

  for (const block of blocks) {
    const C  = wordToCode(block);
    const C2 = C ^ key;

    const idx = Number(C2 % BigInt(size * size));
    const X = idx % size;
    const Y = Math.floor(idx / size);

    ctx.fillRect(X, Y, 1, 1);
  }

  alert("✔ تم تحويل النص إلى صورة نقاط بنجاح!");
}

/* ============================================================
   7) Save Image
============================================================ */
function saveImage() {
  const canvas = document.getElementById("geoCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-geofreq.png";
  a.click();
}

/* ============================================================
   8) Decode Image → Text
============================================================ */
function decodeGeoFreq() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة.");

  const key = BigInt(document.getElementById("userKey").value || "0");

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("geoCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    const blocks = [];

    for (let y = 0; y < canvas.height; y++) {
      for (let x = 0; x < canvas.width; x++) {
        const i = (y * canvas.width + x) * 4;

        if (data[i] < 128) {
          const idx = BigInt(y * canvas.width + x);
          const C2 = idx;
          const C  = C2 ^ key;
          const block = codeToWord(C);
          blocks.push(block);
        }
      }
    }

    const text = blocks.join(" ");
    document.getElementById("outputText").textContent = text;
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
