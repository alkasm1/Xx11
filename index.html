<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM GeoFreq v5.0 — Block Panels (1008 px per row)</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover { background: #0a8c6c; }
textarea, input[type="file"], input[type="text"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 120px;
  white-space: pre-wrap;
}
#canvasWrapper { margin-top: 20px; text-align: center; }
</style>
</head>

<body>

<header>ALM GeoFreq v5.0 — Block Panels (1008 px per row)</header>

<div class="container">

  <h3>مفتاح المستخدم:</h3>
  <input id="userKey" type="text" value="123456789">

  <h3>النص العربي:</h3>
  <textarea id="inputText" rows="8" placeholder="اكتب نصًا عربيًا هنا..."></textarea>

  <button onclick="encode()">تحويل النص إلى صورة</button>

  <div id="canvasWrapper">
    <canvas id="geoCanvas"></canvas>
    <button onclick="saveImage()">💾 حفظ الصورة</button>
  </div>

  <hr>

  <h3>استعادة النص من صورة:</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decode()">استعادة النص</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ============================================================
   Normalization
============================================================ */
function normalizeArabic(s) {
  return (s || "")
    .replace(/[إأآ]/g, "ا")
    .replace(/ى/g, "ي")
    .replace(/ؤ/g, "و")
    .replace(/ئ/g, "ي")
    .replace(/ة/g, "ه");
}

/* ============================================================
   Base‑32 Alphabet
============================================================ */
const B = 32;
const LMAX = 12;

const indexToChar = {
  0:"",1:"ا",2:"ب",3:"ت",4:"ث",5:"ج",6:"ح",7:"خ",
  8:"د",9:"ذ",10:"ر",11:"ز",12:"س",13:"ش",14:"ص",
  15:"ض",16:"ط",17:"ظ",18:"ع",19:"غ",20:"ف",21:"ق",
  22:"ك",23:"ل",24:"م",25:"ن",26:"ه",27:"و",28:"ي"
};

const charToIndex = {};
for (const [i,ch] of Object.entries(indexToChar)) {
  if (ch) charToIndex[ch] = parseInt(i, 10);
}

/* ============================================================
   Split word into blocks
============================================================ */
function splitWord(word) {
  const blocks = [];
  for (let i = 0; i < word.length; i += LMAX) {
    blocks.push(word.slice(i, i + LMAX));
  }
  return blocks;
}

/* ============================================================
   word → C
============================================================ */
function wordToCode(word){
  const c = new Array(LMAX).fill(0);
  let pos = 0;
  for (let i = word.length - 1; i >= 0; i--){
    const idx = charToIndex[word[i]];
    if (idx === undefined) throw new Error("حرف غير مدعوم: " + word[i]);
    c[pos++] = idx;
  }
  let C = 0n;
  for (let i = 0; i < LMAX; i++){
    C += BigInt(c[i]) * (BigInt(B) ** BigInt(i));
  }
  return C;
}

/* ============================================================
   C → word
============================================================ */
function codeToWord(Cbig){
  let C = BigInt(Cbig);
  const digits = [];
  for (let i = 0; i < LMAX; i++){
    digits.push(Number(C % BigInt(B)));
    C /= BigInt(B);
  }
  let w = "";
  for (let i = LMAX - 1; i >= 0; i--){
    w += indexToChar[digits[i]] || "";
  }
  return w;
}

/* ============================================================
   Encode — Block Panels (125 blocks per row)
============================================================ */
function encode() {
  const key = BigInt(document.getElementById("userKey").value || "0");
  let text = normalizeArabic(document.getElementById("inputText").value.trim());
  if (!text) return alert("الرجاء إدخال نص.");

  const size = 1024;
  const canvas = document.getElementById("geoCanvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, size, size);

  const PANEL_PIXELS = 1008;
  const PIXELS_PER_BLOCK = 8;
  const BYTES_PER_BLOCK = 8;
  const MAX_BLOCKS_PER_PANEL = 125;

  // 1) بناء كل البلوكات
  const allBlocks = [];
  const words = text.split(/\s+/);
  for (const w of words) {
    for (const b of splitWord(w)) {
      allBlocks.push(b);
    }
  }

  // 2) تقسيم البلوكات إلى Panels
  const panelsBlocks = [];
  for (let i = 0; i < allBlocks.length; i += MAX_BLOCKS_PER_PANEL) {
    panelsBlocks.push(allBlocks.slice(i, i + MAX_BLOCKS_PER_PANEL));
  }

  // 3) هيدر عالمي
  const globalPanels = BigInt(panelsBlocks.length);
  for (let i = 0; i < 8; i++) {
    const byteVal = Number((globalPanels >> BigInt(8 * i)) & 0xFFn);
    const x = i;
    const y = 0;
    const gray = 255 - byteVal;
    const img = ctx.createImageData(1,1);
    img.data[0]=gray; img.data[1]=gray; img.data[2]=gray; img.data[3]=255;
    ctx.putImageData(img, x, y);
  }

  // 4) كتابة Panels — كل Panel في صف مستقل
  let row = 1;

  panelsBlocks.forEach(blocks => {
    const blocksCount = BigInt(blocks.length);

    // هيدر الـPanel
    for (let i = 0; i < 8; i++) {
      const byteVal = Number((blocksCount >> BigInt(8 * i)) & 0xFFn);
      const x = i;
      const y = row;
      const gray = 255 - byteVal;
      const img = ctx.createImageData(1,1);
      img.data[0]=gray; img.data[1]=gray; img.data[2]=gray; img.data[3]=255;
      ctx.putImageData(img, x, y);
    }

    // كتابة البلوكات
    for (let bi = 0; bi < blocks.length; bi++) {
      const C  = wordToCode(blocks[bi]);
      const C2 = C ^ key;

      for (let byteIndex = 0; byteIndex < BYTES_PER_BLOCK; byteIndex++) {
        const byteVal = Number((C2 >> BigInt(8 * byteIndex)) & 0xFFn);
        const x = 8 + bi * PIXELS_PER_BLOCK + byteIndex;
        const y = row;
        const gray = 255 - byteVal;
        const img = ctx.createImageData(1,1);
        img.data[0]=gray; img.data[1]=gray; img.data[2]=gray; img.data[3]=255;
        ctx.putImageData(img, x, y);
      }
    }

    row++;
  });

  alert("✔ تم إنشاء الصورة بنجاح!");
}

/* ============================================================
   Save
============================================================ */
function saveImage() {
  const canvas = document.getElementById("geoCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-geofreq-v5.0.png";
  a.click();
}

/* ============================================================
   Decode — Block Panels
============================================================ */
function decode() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return alert("اختر صورة.");

  const key = BigInt(document.getElementById("userKey").value || "0");

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("geoCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const size = canvas.width;
    const data = ctx.getImageData(0, 0, size, size).data;

    const PIXELS_PER_BLOCK = 8;
    const BYTES_PER_BLOCK = 8;

    // قراءة عدد الـPanels
    let panelsCount = 0n;
    for (let i = 0; i < 8; i++) {
      const x = i;
      const y = 0;
      const idx = (y * size + x) * 4;
      const r = data[idx];
      const byteVal = 255 - r;
      panelsCount |= (BigInt(byteVal) << BigInt(8 * i));
    }

    const totalPanels = Number(panelsCount);
    let finalBlocks = [];

    // قراءة Panels
    for (let row = 1; row <= totalPanels; row++) {

      // عدد البلوكات
      let blocksCount = 0n;
      for (let i = 0; i < 8; i++) {
        const x = i;
        const y = row;
        const idx = (y * size + x) * 4;
        const r = data[idx];
        const byteVal = 255 - r;
        blocksCount |= (BigInt(byteVal) << BigInt(8 * i));
      }

      const totalBlocks = Number(blocksCount);

      // قراءة البلوكات
      for (let bi = 0; bi < totalBlocks; bi++) {
        let C2 = 0n;
        for (let byteIndex = 0; byteIndex < BYTES_PER_BLOCK; byteIndex++) {
          const x = 8 + bi * PIXELS_PER_BLOCK + byteIndex;
          const y = row;
          const idx = (y * size + x) * 4;
          const r = data[idx];
          const byteVal = 255 - r;
          C2 |= (BigInt(byteVal) << BigInt(8 * byteIndex));
        }
        const C = C2 ^ key;
        finalBlocks.push(codeToWord(C));
      }
    }

    document.getElementById("outputText").textContent =
      finalBlocks.join(" ");
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
